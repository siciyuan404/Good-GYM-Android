name: Build Native APK

# 触发条件:
# - 推送 v* 开头的 tag (如 v0.1.0-native) → 构建 APK 并创建 GitHub Release
# - 手动触发 (workflow_dispatch) → 只构建, 不创建 Release
# - push 到 main 分支 → 只构建验证 (不发布)
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 创建 GitHub Release 必需权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: false

      - name: Print environment
        run: |
          echo "Java: $(java -version 2>&1 | head -n1)"
          echo "Gradle wrapper: $(cat gradle/wrapper/gradle-wrapper.properties | grep distributionUrl)"

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --console=plain --no-daemon --stacktrace

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: good-gym-android-native-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
          draft: false
          # tag 名包含 "-" (如 v0.1.0-native-alpha) 时标记为预发布
          prerelease: ${{ contains(github.ref_name, '-') }}
