name: Build APK

# 触发条件:
# - 推送 v* 开头的 tag (如 v0.1.0) → 构建 release APK 并创建 GitHub Release
# - 手动触发 (workflow_dispatch) → 只构建, 不创建 Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 创建 GitHub Release 必需权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify analysis
        run: flutter analyze lib

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: good-gym-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          draft: false
          # tag 名包含 "-" (如 v0.1.0-beta) 时标记为预发布
          prerelease: ${{ contains(github.ref_name, '-') }}
